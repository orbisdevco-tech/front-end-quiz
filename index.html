<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Frontend quiz app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Quiz menu start -->

    <header>
      <h1>
        <span></span>
      </h1>

      <nav>
        <img src="/assets/images/icon-sun-dark.svg" />
        <button>Toggle</button>
        <img src="/assets/images/icon-moon-dark.svg" />
      </nav>
    </header>

    <main>
      <section class="hero">
        <h2 class="hero__heading">
          Welcome to the
          <span> Frontend Quiz! </span>
        </h2>
        <p class="hero__description">Pick a subject to get started.</p>
      </section>

      <nav>
        <ul class="quiz-menu-list">
          <li>
            <a href="/quiz/html">
              <span data-variant="orange">
                <img src="/assets/images/icon-html.svg" />
              </span>
              <span> HTML</span>
            </a>
          </li>
          <li>
            <a href="/quiz/css">
              <span data-variant="green">
                <img src="/assets/images/icon-css.svg" />
              </span>
              <span> CSS</span>
            </a>
          </li>
          <li>
            <a href="/quiz/javascript">
              <span data-variant="blue">
                <img src="/assets/images/icon-js.svg" />
              </span>
              <span> JavaScript</span></a
            >
          </li>
          <li>
            <a href="/quiz/accessibility">
              <span data-variant="purple">
                <img src="/assets/images/icon-accessibility.svg" />
              </span>
              <span> Accessibility</span>
            </a>
          </li>
        </ul>
      </nav>
    </main>

    <!-- Quiz menu end -->

    <!-- Quiz question start -->

    <template>
      Question
      <!-- number -->
      of 10 A B C D Submit answer
    </template>

    <!-- Quiz question end -->

    <!-- Quiz completed start -->
    <template>
      Quiz completed You scored...

      <!-- score -->
      out of 10
    </template>

    <!-- Quiz completed end -->
  </body>
</html>
