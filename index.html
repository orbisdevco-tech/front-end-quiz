<!doctype html>
<html lang="en">
  <head>

    <link

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <header>
      <h1>

    <main>
      <section>
        <h2>
          Welcome to the

      </section>

      <nav>
        <ul>
          <li>
            <a href="/quiz/html"> HTML </a>

          <li>
            <a href="/quiz/css"> CSS </a>

          <li>

          <li>
            <a href="/quiz/accessibility"> Accessibility </a>
          </li>
        </ul>

    <!-- Quiz menu end -->

    <!-- Quiz question start -->

    <template>
      Question
      <!-- number -->
      of 10 A B C D Submit answer
    </template>

    <!-- Quiz question end -->

    <template>
      Quiz completed You scored...

      <!-- score -->
      out of 10
    </template>
