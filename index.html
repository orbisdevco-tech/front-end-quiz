<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Frontend quiz app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />

    <!-- pages -->
    <link rel="stylesheet" href="/pages/home-page.css" />
    <link rel="stylesheet" href="/pages/quiz-page.css" />
    <!-- components -->
    <link rel="stylesheet" href="/components/quiz-header-logo.css" />
  </head>
  <body>
    <!-- Quiz menu start -->

    <header>
      <h1 id="logo-placeholder"></h1>

      <nav>
        <img src="/assets/images/icon-sun-dark.svg" />
        <input type="checkbox" />
        <img src="/assets/images/icon-moon-dark.svg" />
      </nav>
    </header>

    <!-- Quiz menu end -->

    <main>
      <!-- dynamic rendering -->
    </main>

    <!-- Quiz Page start -->

    <template id="home-page-template">
      <section class="hero">
        <div>
          <h2 class="hero__heading">
            Welcome to the
            <span> Frontend Quiz! </span>
          </h2>
        </div>
        <p class="hero__description">Pick a subject to get started.</p>
      </section>

      <nav>
        <ul class="quiz-menu-list">
          <li>
            <a href="/quiz/html">
              <span data-variant="orange">
                <img src="/assets/images/icon-html.svg" />
              </span>
              <span> HTML</span>
            </a>
          </li>
          <li>
            <a href="/quiz/css">
              <span data-variant="green">
                <img src="/assets/images/icon-css.svg" />
              </span>
              <span> CSS</span>
            </a>
          </li>
          <li>
            <a href="/quiz/javascript">
              <span data-variant="blue">
                <img src="/assets/images/icon-js.svg" />
              </span>
              <span> JavaScript</span></a
            >
          </li>
          <li>
            <a href="/quiz/accessibility">
              <span data-variant="purple">
                <img src="/assets/images/icon-accessibility.svg" />
              </span>
              <span> Accessibility</span>
            </a>
          </li>
        </ul>
      </nav>
    </template>

    <!-- Quiz page end -->

    <!-- Quiz question start -->

    <template id="quiz-header-logo">
      <span class="quiz-header-logo__icon" role="presentation"></span>
      <span class="quiz-header-logo__label"> Accessibility </span>
    </template>

    <template id="quiz-page-template">
      <section class="quiz-question">
        <span class="quiz-question__label"> Question 6 of 10 </span>

        <h2>
          Which of these color contrast ratios defines the minimum WCAG 2.1
          Level AA requirement for normal text?
        </h2>

        <progress value="6" max="10"></progress>
      </section>

      <form class="quiz-answers-form">
        <fieldset>
          <label class="option-card">
            <input type="radio" name="answer" value="A" hidden />
            <span class="option-card__badge">A</span>
            <span>4.5 : 1</span>
          </label>

          <label class="option-card">
            <input type="radio" name="answer" value="A" hidden />
            <span class="option-card__badge">A</span>
            <span>4.5 : 1</span>
          </label>

          <label class="option-card">
            <input type="radio" name="answer" value="A" hidden />
            <span class="option-card__badge">A</span>
            <span>4.5 : 1</span>
          </label>

          <label class="option-card">
            <input type="radio" name="answer" value="A" hidden />
            <span class="option-card__badge">A</span>
            <span>4.5 : 1</span>
          </label>
        </fieldset>

        <button class="submit-btn">Submit Answer</button>
      </form>
    </template>

    <!-- Quiz question end -->

    <!-- Quiz completed start -->
    <template>
      Quiz completed You scored...

      <!-- score -->
      out of 10
    </template>

    <!-- Quiz completed end -->

    <script src="/app.js" type="module"></script>
  </body>
</html>
