<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Frontend quiz app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/styles.css" />

    <!-- pages -->
    <link rel="stylesheet" href="/pages/home-page.css" />
    <link rel="stylesheet" href="/pages/quiz-page.css" />
    <link rel="stylesheet" href="/pages/result-page.css" />

    <!-- components -->
    <link rel="stylesheet" href="/components/quiz-header-logo.css" />
    <link rel="stylesheet" href="/components/language-logo.css" />
  </head>
  <body>
    <!-- Quiz menu start -->

    <header>
      <h1 id="logo-placeholder"></h1>

      <nav>
        <img
          src="/assets/images/icon-sun-dark.svg"
          alt=""
          role="presentation"
        />
        <label id="theme-switch">
          <input class="switch" type="checkbox" />
          <span class="slider"></span>
        </label>
        <img
          src="/assets/images/icon-moon-dark.svg"
          alt=""
          role="presentation"
        />
      </nav>
    </header>

    <!-- Quiz menu end -->

    <main>
      <!-- dynamic rendering -->
    </main>

    <!-- Quiz Page start -->

    <template id="home-page-template">
      <section class="hero">
        <div>
          <h2 class="hero__heading">
            Welcome to the
            <span> Frontend Quiz! </span>
          </h2>
        </div>
        <p class="hero__description">Pick a subject to get started.</p>
      </section>

      <nav>
        <ul class="quiz-menu-list">
          <li>
            <a href="/quiz/html">
              <language-logo data-variant="html"></language-logo>
              <span> HTML</span>
            </a>
          </li>
          <li>
            <a href="/quiz/css">
              <language-logo data-variant="css"></language-logo>
              <span> CSS</span>
            </a>
          </li>
          <li>
            <a href="/quiz/javascript">
              <language-logo data-variant="javascript"></language-logo>
              <span> JavaScript</span></a
            >
          </li>
          <li>
            <a href="/quiz/accessibility">
              <language-logo data-variant="accessibility"></language-logo>
              <span> Accessibility</span>
            </a>
          </li>
        </ul>
      </nav>
    </template>

    <!-- Quiz page end -->

    <!-- Quiz question start -->

    <template id="quiz-page-template">
      <section class="quiz-question">
        <span class="quiz-question__label"> Question 6 of 10 </span>

        <h2 class="quiz-question__text">
          Which of these color contrast ratios defines the minimum WCAG 2.1
          Level AA requirement for normal text?
        </h2>

        <progress value="6" max="10"></progress>
      </section>

      <form class="quiz-answers-form">
        <fieldset>
          <!-- dynamically render -->
        </fieldset>
        <button class="primary-btn" type="submit">Submit Answer</button>
      </form>

      <template id="quiz-answer-template">
        <label class="option-card" data-status="">
          <input type="radio" name="answer" value="A" />
          <span class="option-card__badge">A</span>
          <span class="option-card__text">4.5 : 1</span>

          <span class="option-card__result" aria-live="polite">
            <p class="sr-only"></p>
            <img
              role="presentation"
              data-role="correct"
              src="/assets/images/icon-correct.svg"
            />
            <img
              role="presentation"
              data-role="incorrect"
              src="/assets/images/icon-incorrect.svg"
            />
          </span>
        </label>
      </template>
    </template>

    <!-- Quiz question end -->

    <!-- Quiz completed start -->
    <template id="result-page-template">
      <section>
        <h2 class="result-page__heading">
          Quiz completed
          <span>You scored... </span>
        </h2>
      </section>

      <!-- score -->
      <section>
        <div class="result-page__card">
          <quiz-header-logo></quiz-header-logo>
          <h2 id="result-score">10</h2>
          <p>out of <span id="result-score-total"> 10</span></p>
        </div>
        <button class="primary-btn">
          <a href="/"> Play Again </a>
        </button>
      </section>
    </template>

    <!-- components -->
    <template id="language-logo">
      <span class="language-logo__icon" role="presentation"></span>
    </template>

    <template id="quiz-header-logo">
      <language-logo></language-logo>
      <span class="quiz-header-logo__label">Accessibility</span>
    </template>

    <!-- end components -->

    <!-- Quiz completed end -->

    <!-- <div role="presentation" class="illustration" aria-hidden="true">
      <img src="/assets/images/pattern-background-desktop-light.svg" />
      <div role="presentation" class="illustration" aria-hidden="true"></div>
    </div> -->

    <!-- script -->
    <script src="/app.js" type="module"></script>
  </body>
</html>
